    <title>Github Issues | Home</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

<body>
    <header
        class="bg-white px-[80px] py-[16px] flex md:justify-between flex-col md:flex-row justify-center items-center gap-5">
        <div class="flex justify-center items-center gap-2">
            <img class="h-[36px] w-[36px]" src="./assets/github-logo.png" alt="">
            <h1 class="text-[24px] font-semibold">GitHub Issues Tracker</h1>
        </div>
        <div class="flex gap-2">
            <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                        stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input type="search" required placeholder="Search" />
            </label>
            <button class="btn btn-primary">Search</button>
        </div>
    </header>
    <main class="container mx-auto mt-[60px]">
        <div
            class="bg-white p-[24px] rounded-md flex flex-wrap items-center gap-2 justify-center md:justify-start shadow-md">
            <button id="all" class="btn btn-primary btn-outline w-[120px]">All</button>
            <button id="open" class="btn btn-primary btn-outline w-[120px]">Open</button>
            <button id="closed" class="btn btn-primary btn-outline w-[120px]">Clossed</button>
        </div>

        <div class="mt-4 bg-[#FBFBFB] rounded-md shadow-md">
            <div
                class="flex flex-col md:flex-row justify-center items-center gap-6 md:justify-between p-6 bg-white rounded-md shadow-md">
                <div class="flex gap-2 items-center">
                    <img class="bg-[#ECE4FF] rounded-full p-2" src="./assets/Aperture.png" alt="">
                    <div>
                        <h1 id="issue-count" class="font-semibold text-[20px]"></h1>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <p><i class="fa-solid fa-circle" style="color: rgb(10, 172, 101);"></i> Open</p>
                    <p><i class="fa-solid fa-circle" style="color: rgb(100, 10, 172);"></i> Clossed</p>
                </div>
            </div>
            <section id="spinner" class="flex justify-center items-center my-20" hidden="true">
                <span class="loading loading-infinity loading-xl"></span>
            </section>
            <div id="card-container" class="p-6 grid grid-cols-1 md:grid-cols-4 gap-3 justify-items-center">
